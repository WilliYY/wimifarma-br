<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Icone de mapa</title>
  <desc id="desc">Mapa colorido com marcador vermelho em fundo transparente.</desc>
  <defs>
