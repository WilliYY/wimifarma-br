services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wimifarma-br-app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AUTH_SECRET: ${AUTH_SECRET:?Defina AUTH_SECRET no arquivo .env}
      AUTH_URL: ${AUTH_URL:-http://localhost:3001}
      DATABASE_URL: ${DATABASE_URL:?Defina DATABASE_URL no arquivo .env}
      HOSTNAME: 0.0.0.0
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3001}
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---max_old_space_size=1024}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: ${APP_MEM_LIMIT:-1536m}
    mem_reservation: ${APP_MEM_RESERVATION:-512m}
    networks:
      - wimifarma-br-network
    ports:
      - "${APP_HOST_BIND:-127.0.0.1}:${APP_PORT:-3001}:3000"
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: wimifarma-br-postgres
    command:
      - postgres
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:-8MB}
      - -c
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-128MB}
      - -c
      - effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-768MB}
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-50}
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Defina POSTGRES_DB no arquivo .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no arquivo .env}
      POSTGRES_USER: ${POSTGRES_USER:?Defina POSTGRES_USER no arquivo .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: ${POSTGRES_MEM_LIMIT:-768m}
    mem_reservation: ${POSTGRES_MEM_RESERVATION:-512m}
    networks:
      - wimifarma-br-network
    restart: unless-stopped
    shm_size: ${POSTGRES_SHM_SIZE:-128mb}
    volumes:
      - wimifarma-br-postgres-data:/var/lib/postgresql/data

  migrate:
    profiles:
      - tools
    build:
      context: .
      dockerfile: Dockerfile
      target: tools
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:?Defina DATABASE_URL no arquivo .env}
    mem_limit: ${TOOLS_MEM_LIMIT:-768m}
    mem_reservation: ${TOOLS_MEM_RESERVATION:-256m}
    networks:
      - wimifarma-br-network
    command: npm run prisma:deploy

  seed:
    profiles:
      - tools
    build:
      context: .
      dockerfile: Dockerfile
      target: tools
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ADMIN_EMAIL: ${ADMIN_EMAIL:?Defina ADMIN_EMAIL no arquivo .env}
      ADMIN_NAME: ${ADMIN_NAME:?Defina ADMIN_NAME no arquivo .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Defina ADMIN_PASSWORD no arquivo .env}
      ADMIN_RESET_PASSWORD: ${ADMIN_RESET_PASSWORD:-false}
      DATABASE_URL: ${DATABASE_URL:?Defina DATABASE_URL no arquivo .env}
    mem_limit: ${TOOLS_MEM_LIMIT:-768m}
    mem_reservation: ${TOOLS_MEM_RESERVATION:-256m}
    networks:
      - wimifarma-br-network
    command: npm run prisma:seed

networks:
  wimifarma-br-network:
    name: wimifarma-br-network

volumes:
  wimifarma-br-postgres-data:
    name: wimifarma-br-postgres-data
